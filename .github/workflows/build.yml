name: Build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            os_name: macos-aarch64
          - platform: macos-latest
            target: x86_64-apple-darwin
            os_name: macos-x86_64
          - platform: ubuntu-22.04
            target: ""
            os_name: linux
          - platform: windows-latest
            target: ""
            os_name: windows

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.target != ''
        run: rustup target add "${{ matrix.target }}"

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            pnpm tauri build -- --target "${{ matrix.target }}"
          else
            pnpm tauri build
          fi

      - name: Resolve bundle path
        id: bundle
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            echo "path=src-tauri/target/${{ matrix.target }}/release/bundle" >> "$GITHUB_OUTPUT"
          else
            echo "path=src-tauri/target/release/bundle" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcp-inspector-${{ matrix.os_name }}
          if-no-files-found: error
          path: ${{ steps.bundle.outputs.path }}
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-tauri
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*
